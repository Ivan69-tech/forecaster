services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: forecaster
      POSTGRES_PASSWORD: forecaster
      POSTGRES_DB: forecaster
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forecaster"]
      interval: 5s
      timeout: 5s
      retries: 10

  forecast-service:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://forecaster:forecaster@postgres:5432/forecaster
    volumes:
      - models_data:/data/models
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  models_data:
