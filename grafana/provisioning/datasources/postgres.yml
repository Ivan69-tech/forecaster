apiVersion: 1

datasources:
  - name: PostgreSQL
    type: postgres
    uid: forecaster-pg
    url: postgres:5432
    user: forecaster
    secureJsonData:
      password: forecaster
    jsonData:
      database: forecaster
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false
