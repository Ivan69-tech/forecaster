services:
  
  # ── Service d'initialisation (s'exécute une seule fois) ─────────────────────
  # Insère un site demo, charge l'historique CSV, entraîne le modèle,
  # génère la première prévision 48h.
  forecast-init:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python scripts/init_demo.py
    env_file:
      - ../.env
    volumes:
      - /data/models:/data/models
      - ../scripts:/app/scripts:ro   # mount local pour éviter un rebuild à chaque modif
    restart: "no"

  # ── Service de prévision (scheduler APScheduler) ─────────────────────────────
  forecast-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - /data/models:/data/models
    restart: unless-stopped